site_name: Rubén Jiménez Mejías — Projects
site_description: Portfolio showcasing robotics, autonomous systems, and innovative technology projects
site_author: Rubén Jiménez Mejías
site_url: https://rubenayla.xyz/

# Video sidecar .md files live next to their MP4 in docs/videos/; they're
# metadata for agents (rating, source, status), not rendered pages.
exclude_docs: |
  videos/*.md


theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.annotate
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Driverless Kart:
      - Overview: projects/kart.md
      - Build Journey: build-journey/index.md
  - Partle: projects/partle.md
  - Cyberwheel: projects/cyberwheel.md
  - Investment Analysis: projects/invest.md
  - Writing:
      - Overview: writing/index.md
      - Essays:
          - US Healthcare Costs:
              - Essay: writing/healthcare/index.md
              - Main Analysis Tree: writing/healthcare/main-tree.md
      - Standards: writing/standards.md
  - About: about.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rubenayla
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/rubenayla/
      name: LinkedIn
    - icon: fontawesome/solid/cube
      link: https://grabcad.com/ruben.jimenez-15/models
      name: GrabCAD
